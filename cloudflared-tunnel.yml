# Optional template for a self-managed cloudflared tunnel.
#
# If Home Assistant manages your Cloudflare Tunnel, you do not need this file.
#
# Steps:
#   1. cloudflared tunnel login
#   2. cloudflared tunnel create squeezebox-bridge
#   3. Replace the placeholder values below
#   4. cloudflared tunnel route dns squeezebox-bridge bridge.yourdomain.com
#   5. cloudflared tunnel --config cloudflared-tunnel.yml run squeezebox-bridge

tunnel: YOUR_TUNNEL_UUID
credentials-file: C:\Windows\System32\config\systemprofile\.cloudflared\YOUR_TUNNEL_UUID.json

ingress:
  - hostname: bridge.yourdomain.com
    service: http://127.0.0.1:5174
  - service: http_status:404
